<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工補鐘管理 - 離線增強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .tab-active { background-color: #1d4ed8; color: white; box-shadow: 0 10px 15px -3px rgba(29, 78, 216, 0.3); }
        .input-enhanced { @apply p-4 border-2 border-slate-200 rounded-2xl outline-none transition-all font-bold text-slate-800 bg-white; }
        .input-enhanced:focus { @apply border-blue-600 ring-4 ring-blue-500/10; }
        .btn-primary { @apply bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95 disabled:bg-slate-300; }
        
        /* 組別色彩定義 */
        .rank-wm_anc-theme { --rank-color: #f59e0b; --rank-bg: #fffbeb; }
        .rank-apn-theme { --rank-color: #2563eb; --rank-bg: #eff6ff; }
        .rank-rn-theme { --rank-color: #8b5cf6; --rank-bg: #f5f3ff; }
        .rank-pca-theme { --rank-color: #059669; --rank-bg: #ecfdf5; }
        .rank-ea-theme { --rank-color: #d946ef; --rank-bg: #fdf4ff; }

        .rank-card-header { background-color: var(--rank-color); color: white; padding: 0.75rem 1rem; font-weight: 900; font-size: 0.75rem; display: flex; justify-content: space-between; }
        .record-card-ot { border-left: 8px solid #2563eb; }
        .record-card-taken { border-left: 8px solid #10b981; }
        
        .text-max-highlight { color: #dc2626 !important; font-weight: 900 !important; }

        label { color: #64748b; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; }
        .overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        
        .btn-delete { @apply p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all; }
        .btn-delete-staff { @apply p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100; }
        
        input[type="file"]::file-selector-button {
            @apply bg-slate-800 text-white px-4 py-2 rounded-lg font-bold text-xs border-none cursor-pointer hover:bg-slate-700 mr-4;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div id="app" class="max-w-6xl mx-auto">
        <!-- 頂部導航 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3.5 rounded-2xl shadow-xl shadow-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tighter">Staff <span class="text-blue-600">TimeTracker</span></h1>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Offline-First Management</p>
                </div>
            </div>
            <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                <button onclick="switchTab('main')" id="btn-main" class="px-10 py-2.5 rounded-xl font-bold text-sm tab-active">數據查詢</button>
                <button onclick="handleSettingsClick()" id="btn-settings" class="px-10 py-2.5 rounded-xl font-bold text-sm text-slate-500 hover:text-blue-600">後台管理</button>
            </div>
        </div>

        <!-- 主視圖 -->
        <div id="view-main" class="space-y-8">
            <div class="card p-8 grid grid-cols-1 md:grid-cols-3 gap-8 items-end border-2 border-slate-200">
                <div><label>1. 選擇組別</label><select id="main-filter-role" onchange="filterEmployeeList()" class="input-enhanced w-full"><option value="">-- 全部 --</option><option value="WM_ANC">WM/ANC</option><option value="APN">APN</option><option value="RN">RN</option><option value="PCA">PCA</option><option value="EA">EA</option></select></div>
                <div><label>2. 員工姓名</label><select id="user-select" onchange="loadUserDashboard()" class="input-enhanced w-full"><option value="">-- 請先選擇組別 --</option></select></div>
                <button onclick="clearSearch()" class="h-[60px] bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 border border-slate-300">重置搜尋</button>
            </div>

            <div id="employee-dashboard" class="hidden space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card p-8 bg-slate-900 text-white"><p class="text-slate-400 text-xs font-black uppercase">當前可用結餘</p><h2 class="text-5xl font-black mt-3" id="stat-balance">0m</h2><div id="stat-balance-hours" class="mt-4 text-blue-400 font-black text-xs">0H 0M</div></div>
                    <div class="card p-8 border-l-8 border-blue-600"><p class="text-slate-500 text-xs font-black uppercase">累積超時 (OT)</p><h2 class="text-4xl font-black mt-2" id="stat-total-ot">0 m</h2></div>
                    <div class="card p-8 border-l-8 border-emerald-500"><p class="text-slate-500 text-xs font-black uppercase">累積已補 (Taken)</p><h2 class="text-4xl font-black mt-2" id="stat-total-taken">0 m</h2></div>
                </div>

                <div class="flex items-center justify-between bg-white p-4 rounded-3xl border border-slate-200">
                    <div class="flex items-center gap-4 pl-4"><div id="user-rank-dot" class="w-4 h-4 rounded-full"></div><h3 class="text-2xl font-black" id="display-user-name">員工姓名</h3></div>
                    <button onclick="toggleRecordForm()" class="btn-primary py-3.5 px-8 text-sm">新增紀錄</button>
                </div>

                <!-- 紀錄表單 -->
                <div id="record-form" class="hidden card overflow-hidden border-2 border-blue-600 shadow-2xl animate-in zoom-in-95">
                    <div class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div><label>核實人姓名</label><input type="text" id="recorder-name" class="input-enhanced w-full" placeholder="姓名"></div>
                            <div>
                                <label>核實人職級 (Rank)</label>
                                <select id="recorder-rank" class="input-enhanced w-full">
                                    <option value="APN">APN</option>
                                    <option value="WM">WM</option>
                                    <option value="ANC">ANC</option>
                                    <option value="DOM">DOM</option>
                                </select>
                            </div>
                            <div><label>日期</label><input type="date" id="record-date" class="input-enhanced w-full"></div>
                        </div>
                        
                        <div class="bg-blue-50 p-6 rounded-[32px] border-2 border-blue-100">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                                <div><label class="text-blue-600">開始時間 (Start)</label><input type="time" id="start-time" oninput="calculateMinutes()" class="input-enhanced w-full"></div>
                                <div><label class="text-blue-600">結束時間 (End)</label><input type="time" id="end-time" oninput="calculateMinutes()" class="input-enhanced w-full"></div>
                                <div class="text-center bg-white p-4 rounded-2xl border-2 border-blue-200">
                                    <label class="text-blue-600">自動計算結果</label>
                                    <div class="text-3xl font-black text-blue-700"><span id="record-minutes-display">0</span> <span class="text-sm">mins</span></div>
                                    <input type="hidden" id="record-minutes" value="0">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label>性質</label><select id="record-type" class="input-enhanced w-full"><option value="OT">● 超時工作 (OT +)</option><option value="TAKEN">● 申請補時 (Taken -)</option></select></div>
                            <div><label>備註內容</label><input type="text" id="record-note" placeholder="例如: 支援緊急手術" class="input-enhanced w-full"></div>
                        </div>
                        
                        <div class="flex gap-4">
                            <button onclick="toggleRecordForm()" class="flex-1 py-5 rounded-2xl font-bold text-slate-500 bg-slate-100">取消</button>
                            <button onclick="addRecord()" class="flex-[2] btn-primary py-5 text-lg">確認並儲存</button>
                        </div>
                    </div>
                </div>

                <div id="unified-record-list" class="space-y-4"></div>
            </div>
            <div id="main-empty-state" class="card p-32 text-center border-dashed border-2 border-slate-300 text-slate-400 font-bold">請選取組別與員工姓名以查閱數據</div>
        </div>

        <!-- 後台管理視圖 -->
        <div id="view-settings" class="hidden space-y-8 animate-in slide-in-from-bottom-4">
            <!-- 數據同步備份區 -->
            <div class="card p-8 border-2 border-slate-100 bg-slate-50">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h3 class="text-xl font-black text-slate-900">數據備份與手動同步</h3>
                        <p class="text-xs text-slate-500 font-bold mt-1">您可以下載備份檔，並在另一台設備上「還原」以同步數據。</p>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <button onclick="exportBackupJSON()" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-700 transition-all flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            下載備份檔 (.json)
                        </button>
                    </div>
                </div>
                <div class="mt-6 p-6 bg-white rounded-2xl border border-slate-200">
                    <label class="text-[10px] text-slate-400 font-black mb-2">從備份檔還原數據 (會覆蓋當前資料)</label>
                    <div class="flex items-center gap-4">
                        <input type="file" id="import-json" accept=".json" class="text-xs text-slate-500 font-bold">
                        <button onclick="importBackupJSON()" class="px-6 py-2 bg-blue-50 text-blue-600 rounded-lg font-black text-xs hover:bg-blue-100 transition-all">執行還原</button>
                    </div>
                </div>
            </div>

            <!-- 人員註冊區 -->
            <div class="card p-10">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-8">註冊新人員</h3>
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="flex-1"><label>員工全名</label><input type="text" id="new-member-name" placeholder="例如: Chan Tai Man" class="input-enhanced w-full"></div>
                    <div class="md:w-64"><label>所屬組別</label><select id="new-member-role" class="input-enhanced w-full"><option value="WM_ANC">WM/ANC</option><option value="APN">APN</option><option value="RN">RN</option><option value="PCA">PCA</option><option value="EA">EA</option></select></div>
                    <button onclick="addMember()" class="btn-primary px-16 h-[68px] mt-auto">註冊</button>
                </div>
            </div>

            <!-- 組別列表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                <div class="card overflow-hidden rank-wm_anc-theme"><div class="rank-card-header"><span>WM/ANC</span><span id="group-ot-wm_anc">0m</span></div><div id="list-wm_anc" class="p-4 space-y-2 bg-[var(--rank-bg)] min-h-[100px]"></div></div>
                <div class="card overflow-hidden rank-apn-theme"><div class="rank-card-header"><span>APN</span><span id="group-ot-apn">0m</span></div><div id="list-apn" class="p-4 space-y-2 bg-[var(--rank-bg)] min-h-[100px]"></div></div>
                <div class="card overflow-hidden rank-rn-theme"><div class="rank-card-header"><span>RN</span><span id="group-ot-rn">0m</span></div><div id="list-rn" class="p-4 space-y-2 bg-[var(--rank-bg)] min-h-[100px]"></div></div>
                <div class="card overflow-hidden rank-pca-theme"><div class="rank-card-header"><span>PCA</span><span id="group-ot-pca">0m</span></div><div id="list-pca" class="p-4 space-y-2 bg-[var(--rank-bg)] min-h-[100px]"></div></div>
                <div class="card overflow-hidden rank-ea-theme"><div class="rank-card-header"><span>EA</span><span id="group-ot-ea">0m</span></div><div id="list-ea" class="p-4 space-y-2 bg-[var(--rank-bg)] min-h-[100px]"></div></div>
            </div>

            <div class="flex justify-center gap-4">
                <button onclick="exportToExcel()" class="px-8 py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50">導出 CSV 報表</button>
                <button onclick="logoutAdmin()" class="px-8 py-4 bg-red-50 text-red-600 rounded-2xl font-bold hover:bg-red-100">登出管理員</button>
            </div>
        </div>
    </div>

    <!-- 登入彈窗 -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center hidden p-6 overlay" onclick="if(event.target===this) closeModal('login-overlay')">
        <div class="bg-white rounded-[48px] shadow-2xl w-full max-sm p-14 text-center" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black mb-10">後台授權</h2>
            <input type="password" id="admin-password" placeholder="••••" class="w-full text-center text-4xl font-black border-b-4 border-slate-200 outline-none pb-4 focus:border-blue-600 tracking-[0.5em] mb-12" onkeyup="if(event.key==='Enter') verifyAdmin()">
            <button onclick="verifyAdmin()" class="btn-primary w-full py-6 text-xl">解除鎖定</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-full shadow-2xl transition-all translate-y-32 opacity-0 z-[100] font-bold"></div>

    <script>
        let members = JSON.parse(localStorage.getItem('ot_members')) || [];
        let records = JSON.parse(localStorage.getItem('ot_records')) || [];
        let isAdminLoggedIn = false;
        const rankColors = { 'WM_ANC': '#f59e0b', 'APN': '#2563eb', 'RN': '#8b5cf6', 'PCA': '#059669', 'EA': '#d946ef' };

        window.onload = () => {
            document.getElementById('record-date').valueAsDate = new Date();
            updateAllUI();
        };

        function calculateMinutes() {
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;
            const display = document.getElementById('record-minutes-display');
            const hiddenInput = document.getElementById('record-minutes');

            if (!start || !end) {
                display.innerText = "0";
                hiddenInput.value = "0";
                return;
            }

            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if (diff < 0) diff += 24 * 60; 

            display.innerText = diff;
            hiddenInput.value = diff;
        }

        function addRecord() {
            const userId = document.getElementById('user-select').value;
            const mins = parseInt(document.getElementById('record-minutes').value);
            const recorder = document.getElementById('recorder-name').value.trim();
            const recorderRank = document.getElementById('recorder-rank').value;
            
            if (!userId || mins <= 0 || !recorder) return showToast('❌ 請填寫完整並確保時間大於 0');

            records.push({
                id: Date.now().toString(),
                userId,
                type: document.getElementById('record-type').value,
                date: document.getElementById('record-date').value,
                minutes: mins,
                startTime: document.getElementById('start-time').value,
                endTime: document.getElementById('end-time').value,
                note: document.getElementById('record-note').value.trim(),
                recorder,
                recorderRank 
            });

            updateAllUI();
            loadUserDashboard();
            toggleRecordForm();
            showToast('✅ 紀錄已儲存');
        }

        function deleteRecord(recordId) {
            if (!confirm('確定要永久刪除此筆紀錄嗎？這將無法撤銷。')) return;
            const index = records.findIndex(r => r.id === recordId);
            if (index !== -1) {
                const userId = records[index].userId;
                records.splice(index, 1);
                updateAllUI();
                refreshDashboardData(userId);
                showToast('🗑️ 紀錄已刪除');
            }
        }

        function deleteMember(memberId, event) {
            event.stopPropagation();
            const member = members.find(m => m.id === memberId);
            if (!confirm(`確定要刪除員工「${member.name}」嗎？\n這將同時刪除該員的所有補鐘紀錄！`)) return;

            records = records.filter(r => r.userId !== memberId);
            members = members.filter(m => m.id !== memberId);

            const currentSelected = document.getElementById('user-select').value;
            if (currentSelected === memberId) {
                document.getElementById('employee-dashboard').classList.add('hidden');
                document.getElementById('main-empty-state').classList.remove('hidden');
                document.getElementById('user-select').value = "";
            }

            updateAllUI();
            filterEmployeeList();
            showToast(`🗑️ 已刪除員工 ${member.name}`);
        }

        function switchTab(tab) {
            const isMain = tab === 'main';
            document.getElementById('view-main').classList.toggle('hidden', !isMain);
            document.getElementById('view-settings').classList.toggle('hidden', isMain);
            document.getElementById('btn-main').className = isMain ? 'px-10 py-2.5 rounded-xl font-bold text-sm tab-active' : 'px-10 py-2.5 rounded-xl font-bold text-sm text-slate-500';
            document.getElementById('btn-settings').className = !isMain ? 'px-10 py-2.5 rounded-xl font-bold text-sm tab-active' : 'px-10 py-2.5 rounded-xl font-bold text-sm text-slate-500';
        }

        function handleSettingsClick() {
            if(isAdminLoggedIn) switchTab('settings');
            else { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('admin-password').focus(); }
        }

        function verifyAdmin() {
            if(document.getElementById('admin-password').value === "8888") {
                isAdminLoggedIn = true;
                closeModal('login-overlay');
                switchTab('settings');
                showToast('🔓 歡迎管理員');
            } else showToast('❌ 密碼錯誤');
        }

        function logoutAdmin() { isAdminLoggedIn = false; switchTab('main'); showToast('🔒 已登出'); }

        function filterEmployeeList(selectedId = null) {
            const role = document.getElementById('main-filter-role').value;
            const select = document.getElementById('user-select');
            const filtered = members.filter(m => m.role === role);
            select.innerHTML = '<option value="">-- 選取員工 --</option>' + filtered.map(m => `<option value="${m.id}" ${m.id === selectedId ? 'selected' : ''}>${m.name}</option>`).join('');
        }

        function loadUserDashboard(id = null) {
            const userId = id || document.getElementById('user-select').value;
            if (!userId) return;
            const m = members.find(m => m.id === userId);
            if (!m) return;
            document.getElementById('display-user-name').innerText = m.name;
            document.getElementById('user-rank-dot').style.backgroundColor = rankColors[m.role];
            document.getElementById('employee-dashboard').classList.remove('hidden');
            document.getElementById('main-empty-state').classList.add('hidden');
            refreshDashboardData(userId);
        }

        function jumpToUserRecord(userId, role) {
            document.getElementById('main-filter-role').value = role;
            filterEmployeeList(userId);
            loadUserDashboard(userId);
            switchTab('main');
            showToast(`🔎 正在查看 ${members.find(m => m.id === userId).name} 的紀錄`);
        }

        function refreshDashboardData(userId) {
            const userRecords = records.filter(r => r.userId === userId).sort((a,b) => b.date.localeCompare(a.date));
            const ot = userRecords.filter(r=>r.type==='OT').reduce((s,r)=>s+r.minutes,0);
            const taken = userRecords.filter(r=>r.type==='TAKEN').reduce((s,r)=>s+r.minutes,0);
            const b = ot - taken;
            
            document.getElementById('stat-total-ot').innerText = ot + " m";
            document.getElementById('stat-total-taken').innerText = taken + " m";
            document.getElementById('stat-balance').innerText = b + "m";
            document.getElementById('stat-balance-hours').innerText = `${Math.floor(Math.abs(b)/60)}H ${Math.abs(b)%60}M`;

            const list = document.getElementById('unified-record-list');
            list.innerHTML = userRecords.map(r => `
                <div class="card p-6 flex justify-between items-center ${r.type === 'OT' ? 'record-card-ot' : 'record-card-taken'} relative group">
                    <div class="pr-12">
                        <div class="text-xs font-bold text-slate-400">${r.date} (${r.startTime || '--:--'} - ${r.endTime || '--:--'})</div>
                        <div class="font-black text-slate-800">${r.note || '無備註'}</div>
                        <div class="text-[10px] text-slate-400">核實: ${r.recorder} (${r.recorderRank || 'N/A'})</div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="text-2xl font-black ${r.type === 'OT' ? 'text-blue-600' : 'text-emerald-600'}">${r.type === 'OT' ? '+' : '-'}${r.minutes}m</div>
                        <button onclick="deleteRecord('${r.id}')" class="btn-delete" title="刪除此紀錄">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addMember() {
            const name = document.getElementById('new-member-name').value.trim();
            if (!name) return showToast('請輸入姓名');
            members.push({ id: Date.now().toString(), name, role: document.getElementById('new-member-role').value });
            document.getElementById('new-member-name').value = '';
            updateAllUI();
            showToast('👤 註冊成功');
        }

        function updateAllUI() {
            ['WM_ANC', 'APN', 'RN', 'PCA', 'EA'].forEach(role => {
                const groupMembers = members.filter(m => m.role === role);
                const memberBalances = groupMembers.map(m => {
                    const balance = records.filter(r => r.userId === m.id)
                        .reduce((s, r) => s + (r.type === 'OT' ? r.minutes : -r.minutes), 0);
                    return { ...m, balance };
                });

                const maxBalance = memberBalances.length > 0 ? Math.max(...memberBalances.map(m => m.balance)) : 0;
                const listEl = document.getElementById(`list-${role.toLowerCase()}`);
                let groupSum = 0;

                listEl.innerHTML = memberBalances.map(m => {
                    groupSum += m.balance;
                    const isMax = m.balance === maxBalance && maxBalance > 0;
                    const highlightClass = isMax ? 'text-max-highlight' : '';

                    return `
                        <div class="flex justify-between items-center p-3 rounded-xl border border-slate-100 bg-white cursor-pointer hover:border-blue-300 hover:shadow-sm transition-all group">
                            <div onclick="jumpToUserRecord('${m.id}', '${role}')" class="flex-1 flex justify-between items-center mr-2">
                                <span class="font-bold text-sm text-slate-700 ${highlightClass} group-hover:text-blue-600">${m.name}</span>
                                <span class="font-black text-xs ${isMax ? 'text-max-highlight' : (m.balance >= 0 ? 'text-blue-600' : 'text-red-500')}">${m.balance}m</span>
                            </div>
                            <button onclick="deleteMember('${m.id}', event)" class="btn-delete-staff" title="刪除員工">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    `;
                }).join('');

                document.getElementById(`group-ot-${role.toLowerCase()}`).innerText = groupSum + 'm';
            });

            localStorage.setItem('ot_members', JSON.stringify(members));
            localStorage.setItem('ot_records', JSON.stringify(records));
        }

        // --- 備份與還原功能 ---
        function exportBackupJSON() {
            const data = {
                members: members,
                records: records,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `OT_Tracker_Backup_${new Date().toLocaleDateString()}.json`;
            link.click();
            showToast('💾 備份檔已下載');
        }

        function importBackupJSON() {
            const fileInput = document.getElementById('import-json');
            if (!fileInput.files.length) return showToast('❌ 請先選擇檔案');
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.members || !data.records) throw new Error();
                    
                    if (confirm('還原數據將覆蓋當前所有資料，確定要繼續嗎？')) {
                        members = data.members;
                        records = data.records;
                        updateAllUI();
                        showToast('✅ 數據還原成功');
                        fileInput.value = '';
                    }
                } catch (err) {
                    showToast('❌ 檔案格式不正確');
                }
            };
            reader.readAsText(file);
        }

        function toggleRecordForm() {
            document.getElementById('record-form').classList.toggle('hidden');
            document.getElementById('start-time').value = "";
            document.getElementById('end-time').value = "";
            document.getElementById('recorder-name').value = "";
            calculateMinutes();
        }

        function clearSearch() { document.getElementById('main-filter-role').value = ''; filterEmployeeList(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.remove('translate-y-32', 'opacity-0'); setTimeout(() => t.classList.add('translate-y-32', 'opacity-0'), 3000); }

        function exportToExcel() {
            let csv = "\uFEFF姓名,組別,結餘(分鐘)\n";
            members.forEach(m => {
                const b = records.filter(r=>r.userId===m.id).reduce((s,r)=>s+(r.type==='OT'?r.minutes:-r.minutes),0);
                csv += `"${m.name}","${m.role}",${b}\n`;
            });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); link.download = `Report.csv`; link.click();
        }
    </script>
</body>
</html>
